<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DOOM</title>
    <link rel="stylesheet" href="/js-dos/js-dos.css" />
    <style>
      html,
      body,
      #dos {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
      }

      body {
        font-family: Arial, sans-serif;
      }

      .boot-note {
        position: fixed;
        z-index: 2;
        right: 10px;
        bottom: 10px;
        max-width: 280px;
        padding: 8px 10px;
        border: 1px solid #6b625a;
        background: rgba(18, 10, 8, 0.88);
        color: #f5e9dd;
        font-size: 12px;
        line-height: 1.35;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="dos"></div>
    <div class="boot-note">
      Click the game area to focus. Use Enter, arrows, Ctrl, Alt, and Space.
    </div>
    <script src="/js-dos/js-dos.js"></script>
    <script>
      Dos(document.getElementById("dos"), {
        url: "/doom/doom.jsdos",
        autoStart: true,
        kiosk: true,
        mouseCapture: true,
        renderAspect: "fit",
        pathPrefix: "/js-dos/emulators/",
      });
    </script>
  </body>
</html>
